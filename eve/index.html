<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EVE Battlefield Monitor</title>
    <style>
        body {
            background: #000 url('image_637ebc.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: #fff;
        }
        .glass-panel {
            background: rgba(45, 45, 50, 0.7);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 30px;
            width: 440px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.08);
            text-align: center;
        }
        .faction-row {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 15px 0;
        }
        .faction-header {
            display: flex;
            justify-content: space-between;
            font-size: 1.1em;
            font-weight: 600;
        }
        .system-name {
            display: block;
            text-align: right;
            font-size: 0.75em;
            color: #888;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .ready { color: #00ffaa; text-shadow: 0 0 10px rgba(0,255,170,0.5); }
        .cooldown { color: #ff9d00; }
        .stale-warning { font-size: 0.7em; color: #ff4444; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h2 style="margin-top:0; letter-spacing: 3px; font-size: 1.2em; border-bottom: 1px solid #444; padding-bottom: 15px;">WARZONE STATUS</h2>
        <div id="display">Loading intelligence...</div>
        <div id="staleness"></div>
    </div>

    <script>
        async function update() {
            try {
                const res = await fetch('fw_battlefield_data.json');
                const data = await res.json();
                const now = new Date();
                const lastUpdate = new Date(data.last_updated);
                
                const isStale = (now - lastUpdate) > (3 * 60 * 60 * 1000);
                const factions = ["Caldari", "Minmatar", "Amarr", "Gallente"];
                let html = "";

                factions.forEach(f => {
                    let status = '<span class="ready">BF AVAILABLE</span>';
                    let systemInfo = '';
                    
                    if (!isStale && data.timers[f]) {
                        const openTime = new Date(data.timers[f]);
                        if (openTime > now) {
                            const diff = Math.floor((openTime - now) / 1000);
                            const h = Math.floor(diff / 3600);
                            const m = Math.floor((diff % 3600) / 60);
                            const s = diff % 60;
                            status = `<span class="cooldown">OPENS IN ${h}h ${m}m ${s}s</span>`;
                            
                            // Show which system triggered the current cooldown
                            if (data.last_systems && data.last_systems[f]) {
                                systemInfo = `<span class="system-name">Last BF: ${data.last_systems[f]}</span>`;
                            }
                        }
                    }
                    
                    html += `
                        <div class="faction-row">
                            <div class="faction-header">
                                <span>${f}</span>
                                ${status}
                            </div>
                            ${systemInfo}
                        </div>`;
                });

                document.getElementById('display').innerHTML = html;
                
                if (isStale) {
                    document.getElementById('staleness').innerHTML = 
                        `<div class="stale-warning">⚠️ MONITOR OFFLINE<br>Data older than 3 hours</div>`;
                } else {
                    const timeString = lastUpdate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    document.getElementById('staleness').innerHTML = 
                        `<div style="font-size: 10px; color: #555; margin-top: 15px;">LAST SYNC: ${timeString}</div>`;
                }

            } catch (e) { console.error("Sync error", e); }
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
